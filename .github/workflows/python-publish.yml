#
# This workflow builds wheels/sdist and publishes to TestPyPI (manual) or PyPI (release/manual)
# For more information see: https://cibuildwheel.pypa.io/en/stable/ci-services/#github-actions
#

name: Upload Python Package

on:
  release:
    types: [published]

  workflow_dispatch: # allow running the workflow manually
    inputs:
      repository:
        description: "Target package repository"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:

  test_editable:
    name: Test editable install
    runs-on: ubuntu-latest

    steps:
      - name: Install build tools
        run: sudo apt update && sudo apt install -y meson
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          pip install -e . -vv
          python -c "import pyads; pyads.Connection(ams_net_id='127.0.0.1.1.1', ams_net_port=851)"

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an Intel runner, macos-14 is Apple silicon
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          # We only compile `adslib`, with no link to Python at all, so we only need to pick a single Python version
          # We will fairly the different OS flavours
          CIBW_BUILD: "cp314-*"
          # Skip the versions that give errors during building:
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BEFORE_ALL_LINUX: "/opt/python/cp39-cp39/bin/python -m pip install --upgrade pip meson ninja"
          CIBW_BEFORE_ALL_MACOS: "python -m pip install --upgrade pip meson ninja"
          # Full matrix: https://cibuildwheel.pypa.io/en/stable/options/#build-skip

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_testpypi:
    name: Upload to TestPyPI
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi' }}
    needs: [build_wheels, build_sdist, test_editable]
    environment: testpypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    name: Upload to PyPI
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi') }}
    needs: [build_wheels, build_sdist, test_editable]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
