[real_runtime]
# Test target for this profile: fake | real
ads_target = "real"

# Real Beckhoff runtime endpoint
plc_ip = "127.0.0.1"
plc_ams_net_id = "172.27.32.1.1.1"
plc_ams_port = 851
timeout_ms = 3000

# Optional symbols used by integration tests
test_symbol_int = "GVL.iTestInt"
test_symbol_str = "GVL.sTestString"
test_symbol_struct = "GVL.stTestStruct"
test_symbol_struct_array = "GVL.astTestStructArray"
test_struct_strlen = 80
test_struct_array_size = 2

# Optional RPC method test (TwinCAT method calls via ADS handle + VALBYHND).
# Format: "<FB instance path>#<MethodName>"
test_rpc_method = "GVL.fbTestRemoteMethodCall#m_iSimpleCall"
# Supported: BOOL, INT, DINT, UDINT, REAL, LREAL
test_rpc_return_type = "INT"
# Optional fixed expected return value; leave empty to only type-check the result.
test_rpc_expected_result = "10"

# Optional RPC input payload (choose one approach):
# 1) Single typed parameter:
# test_rpc_write_type = ""
# test_rpc_write_value = ""
#
# 2) Raw bytes payload for complex/multiple parameters (hex, no 0x prefix):
# test_rpc_write_bytes_hex = "0100000002000000"  # e.g. two UDINT params 1,2 (little-endian)
test_rpc_write_type = ""
test_rpc_write_value = ""
test_rpc_write_bytes_hex = ""

# Optional stepchain async RPC integration test.
# When test_stepchain_object is empty, stepchain async test is skipped.
test_stepchain_object = "GVL.fbStepChain"
test_stepchain_method = "m_xStartStepChain"
test_stepchain_abort_method = "m_xAbortStepChain"
test_stepchain_abort_delay_ms = 250

# Status location:
# - Either set test_stepchain_status_symbol to an absolute symbol path, e.g.
#   "GVL.fbTestRemoteStepChainMethodCall.stStepStatus"
# - or leave it empty and status root will be "<test_stepchain_object>.<test_stepchain_status_field>".
test_stepchain_status_symbol = ""
test_stepchain_status_field = "stStepStatus"

# Status field names inside the status struct:
test_stepchain_request_id_field = "udiRequestId"
test_stepchain_done_field = "xDone"
test_stepchain_error_field = "xError"
test_stepchain_error_code_field = "diErrorCode"
test_stepchain_busy_field = "xBusy"
test_stepchain_step_field = "udiStep"
test_stepchain_step_name_field = "sStepName"
test_stepchain_step_name_length = 80

# RPC request id argument name:
test_stepchain_request_id_arg = "udiRequestId"

# done/error comparators; supports bool-like strings (true/false/1/0)
# and integer values (for enum-style state fields).
test_stepchain_done_value = "true"
test_stepchain_error_value = "true"

# Polling + timeout settings for async wait:
# Completion backend: poll | notify
test_stepchain_completion = "poll"
# Used for poll mode only:
test_stepchain_poll_interval_ms = 50
test_stepchain_timeout_s = 15
